<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agora Admin</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #fff; --surface: #fff; --text: #111; --muted: #888; --border: #ddd; --border-light: #eee; --radius: 3px; --accent: #111; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif; background: #fafafa; color: var(--text); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    input, select, textarea { font-size: 16px !important; }

    /* Layout */
    .admin-header { padding: 12px 20px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .admin-header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
    .admin-header a { font-size: 12px; color: var(--muted); text-decoration: none; }
    .admin-header a:hover { color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    #jurisdiction-filter { font-size: 13px; padding: 5px 8px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); }
    main { max-width: 680px; margin: 0 auto; padding: 16px; }

    /* Tabs with counts */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; overflow-x: auto; }
    .tab { padding: 8px 14px; font-size: 12px; font-weight: 500; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab-count { font-size: 10px; font-weight: 700; background: var(--border-light); color: var(--muted); padding: 1px 5px; border-radius: 8px; min-width: 18px; text-align: center; }
    .tab.active .tab-count { background: var(--accent); color: #fff; }

    .section { display: none; }
    .section.active { display: block; }

    /* Cards */
    .card { background: var(--bg); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; }
    .card.warn { border-left: 3px solid #e67e22; }
    .card-title { font-weight: 600; font-size: 14px; }
    .card-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Form elements */
    .field { margin-top: 8px; }
    .field label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 2px; }
    .field input:not([type=checkbox]):not([type=radio]), .field select, .field textarea { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-family: inherit; background: var(--bg); }
    .field textarea { resize: vertical; min-height: 48px; }
    .field-row { display: flex; gap: 8px; }
    .field-row > .field { flex: 1; min-width: 0; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .grid .full { grid-column: 1 / -1; }
    @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 6px 14px; font-size: 12px; font-weight: 500; border-radius: var(--radius); cursor: pointer; border: 1px solid transparent; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-approve { background: #22c55e; color: #fff; }
    .btn-reject { background: #ef4444; color: #fff; }
    .btn-outline { background: none; color: var(--text); border-color: var(--border); }
    .btn-row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

    /* Badges */
    .badge { display: inline-block; font-size: 9px; font-weight: 500; text-transform: uppercase; padding: 1px 5px; border-radius: 2px; }
    .badge-liturgy { background: #e8d5e8; color: #6b2d6b; }
    .badge-prayer { background: #d5e0f0; color: #2d4a7a; }
    .badge-feast { background: #f5ecd0; color: #7a6520; }
    .badge-talk { background: #f0e8d5; color: #7a5a20; }
    .badge-youth { background: #d0e8f5; color: #2d5a8a; }
    .badge-social { background: #d5ead5; color: #2d6a2d; }
    .badge-other { background: #f0f0f0; color: #555; }

    /* Sender row */
    .sender-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border-light); flex-wrap: wrap; }
    .sender-phone { font-family: monospace; font-size: 12px; color: var(--muted); min-width: 110px; }
    .sender-name-input { flex: 1; min-width: 100px; padding: 4px 6px; border: 1px solid var(--border-light); border-radius: var(--radius); }
    .sender-status-select { padding: 4px 6px; border: 1px solid var(--border-light); border-radius: var(--radius); }
    .sender-seen { font-size: 10px; color: var(--muted); }

    /* Expandable */
    .expandable { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-light); }
    .expandable.open { display: block; }
    .expand-trigger { cursor: pointer; }

    /* Schedule card */
    .sched-card { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
    .sched-card.inactive { opacity: 0.4; }

    /* Parish group accordion */
    .parish-group { margin-bottom: 8px; border: 1px solid var(--border-light); border-radius: var(--radius); background: var(--bg); overflow: hidden; }
    .parish-group-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; cursor: pointer; background: #fafafa; user-select: none; }
    .parish-group-header:hover { background: #f5f5f5; }
    .parish-group-name { font-weight: 600; font-size: 13px; }
    .parish-group-meta { font-size: 11px; color: var(--muted); }
    .parish-group-chevron { font-size: 11px; color: var(--muted); transition: transform 0.2s; }
    .parish-group.open .parish-group-chevron { transform: rotate(180deg); }
    .parish-group-body { display: none; border-top: 1px solid var(--border-light); }
    .parish-group.open .parish-group-body { display: block; }
    .parish-group-body .card { margin: 8px; border-radius: var(--radius); }

    /* Toast */
    .toast { position: fixed; bottom: 16px; right: 16px; padding: 8px 16px; border-radius: var(--radius); color: #fff; font-size: 13px; z-index: 2000; transition: opacity 0.3s; }
    .toast-success { background: #22c55e; }
    .toast-error { background: #ef4444; }

    /* Empty */
    .empty { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }

    h3 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 8px; }

    /* Review sections */
    .review-section-header { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); padding: 4px 0 6px; border-bottom: 1px solid var(--border-light); margin-bottom: 8px; }
    .review-section + .review-section { margin-top: 20px; }
    .source-msg { font-size: 11px; color: var(--muted); background: #f7f7f7; border-radius: 2px; padding: 4px 6px; margin-top: 6px; white-space: pre-wrap; word-break: break-word; max-height: 60px; overflow: hidden; }
    .review-poster { display: block; width: 60px; height: auto; border-radius: 3px; border: 1px solid var(--border-light); margin-top: 6px; cursor: zoom-in; }
    .review-poster-row { display: flex; gap: 8px; align-items: flex-start; margin-top: 6px; }
    .review-poster-row .source-msg { flex: 1; margin-top: 0; }
    .diff-row { display: flex; gap: 8px; margin-top: 4px; font-size: 12px; }
    .diff-old { color: #ef4444; text-decoration: line-through; flex: 1; min-width: 0; }
    .diff-new { color: #22c55e; flex: 1; min-width: 0; }
    .raw-response { display: none; margin-top: 8px; padding: 8px; background: #f4f4f4; border-radius: 2px; font-family: monospace; font-size: 11px; white-space: pre-wrap; word-break: break-word; max-height: 200px; overflow-y: auto; color: #333; }
    .raw-response.open { display: block; }
  </style>
</head>
<body>
  <div class="admin-header">
    <h1>Agora Admin</h1>
    <div class="header-right">
      <select id="jurisdiction-filter">
        <option value="">All jurisdictions</option>
        <option value="antiochian">Antiochian</option>
        <option value="greek">Greek</option>
        <option value="serbian">Serbian</option>
        <option value="russian">Russian</option>
        <option value="romanian">Romanian</option>
        <option value="macedonian">Macedonian</option>
        <option value="other">Other</option>
      </select>
      <a href="/">Back to site</a>
    </div>
  </div>

  <main>
    <div class="tabs">
      <button class="tab active" data-tab="review">Review <span class="tab-count" id="count-review">0</span></button>
      <button class="tab" data-tab="senders">Senders <span class="tab-count" id="count-senders">0</span></button>
      <button class="tab" data-tab="parishes">Parishes <span class="tab-count" id="count-parishes">0</span></button>
      <button class="tab" data-tab="schedules">Schedules <span class="tab-count" id="count-schedules">0</span></button>
    </div>

    <div id="section-review" class="section active">
      <div class="review-section">
        <div class="review-section-header">Events <span id="review-events-count"></span></div>
        <div id="review-events-list"></div>
      </div>
      <div class="review-section">
        <div class="review-section-header">Schedules <span id="review-schedules-count"></span></div>
        <div id="review-schedules-list"></div>
      </div>
      <div class="review-section">
        <div class="review-section-header">Parish Changes <span id="review-parishes-count"></span></div>
        <div id="review-parishes-list"></div>
      </div>
      <div class="review-section">
        <div class="review-section-header">Cancellations <span id="review-cancellations-count"></span></div>
        <div id="review-cancellations-list"></div>
      </div>
      <div class="review-section">
        <div class="review-section-header">Dropped <span id="review-dropped-count"></span></div>
        <div id="review-dropped-list"></div>
      </div>
    </div>

    <div id="section-senders" class="section">
      <div id="senders-list"></div>
    </div>

    <div id="section-parishes" class="section">
      <h3 class="expand-trigger" onclick="toggleExpand('add-parish-form')" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;">Add Parish <span id="add-parish-chevron" style="font-size:11px;transition:transform 0.2s;">▶</span></h3>
      <div id="add-parish-form" class="expandable">
      <form id="parish-form" class="card" style="margin-top:8px;">
        <div class="grid">
          <div class="field"><label>Nickname</label><input name="name" required placeholder="St Mary's, Mount Pritchard"></div>
          <div class="field"><label>Full Name</label><input name="full_name" placeholder="St Mary's Antiochian Orthodox Church of the Dormition"></div>
          <div class="field"><label>Jurisdiction</label>
            <select name="jurisdiction" required>
              <option value="antiochian">Antiochian</option>
              <option value="greek">Greek</option>
              <option value="serbian">Serbian</option>
              <option value="russian">Russian</option>
              <option value="romanian">Romanian</option>
              <option value="macedonian">Macedonian</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="field full"><label>Address</label><input name="address" placeholder="161 George St, Redfern NSW 2016"></div>
          <div class="field"><label>Latitude</label><input name="lat" type="number" step="any" required placeholder="-33.8920"></div>
          <div class="field"><label>Longitude</label><input name="lng" type="number" step="any" required placeholder="151.2050"></div>
          <div class="field"><label>Website</label><input name="website" placeholder="https://..."></div>
          <div class="field"><label>Email</label><input name="email" type="email" placeholder="parish@example.com"></div>
          <div class="field"><label>Phone</label><input name="phone" placeholder="02 1234 5678"></div>
          <div class="field"><label>Languages</label><input name="languages" placeholder="English, Arabic"></div>
          <div class="field full"><label>Live URL</label><input name="live_url" placeholder="https://youtube.com/..."></div>
        </div>
        <div class="btn-row">
          <button type="submit" class="btn btn-primary">Add Parish</button>
          <button type="button" class="btn btn-outline" id="geocode-btn">Geocode Address</button>
        </div>
      </form>
      </div>
      <h3 style="margin-top: 20px;">Existing Parishes</h3>
      <div id="parish-list"></div>
    </div>

    <div id="section-schedules" class="section">
      <h3 class="expand-trigger" onclick="toggleExpand('add-schedule-form')" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;">Add Schedule <span id="add-schedule-chevron" style="font-size:11px;transition:transform 0.2s;">▶</span></h3>
      <div id="add-schedule-form" class="expandable">
      <form id="schedule-form" class="card" style="margin-top:8px;">
        <div class="grid">
          <div class="field"><label>Parish</label><select name="parish_id" required id="schedule-parish-select"></select></div>
          <div class="field"><label>Day</label>
            <select name="day_of_week" required>
              <option value="0">Sunday</option><option value="1">Monday</option><option value="2">Tuesday</option>
              <option value="3">Wednesday</option><option value="4">Thursday</option><option value="5">Friday</option><option value="6">Saturday</option>
            </select>
          </div>
          <div class="field"><label>Start (Sydney)</label><input name="start_time" type="time" required></div>
          <div class="field"><label>End (Sydney)</label><input name="end_time" type="time"></div>
          <div class="field"><label>Title</label><input name="title" required placeholder="Sunday Divine Liturgy"></div>
          <div class="field"><label>Type</label>
            <select name="event_type">
              <option value="liturgy">Liturgy</option><option value="prayer">Prayer</option><option value="feast">Feast</option>
              <option value="talk">Talk</option><option value="youth">Youth</option><option value="social">Social</option><option value="other">Other</option>
            </select>
          </div>
          <div class="field"><label>Languages</label><input name="languages" placeholder="English, Arabic, Greek"></div>
        </div>
        <div class="field" style="margin-top:8px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;">
            <input type="checkbox" name="hide_live">
            Never show live badge (e.g. Confession, in-person only)
          </label>
        </div>
        <div class="field" style="margin-top:6px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;">
            <input type="checkbox" name="parish_scoped">
            Parish-only (hidden unless filtered to parish)
          </label>
        </div>
        <div class="btn-row"><button type="submit" class="btn btn-primary">Add Schedule</button></div>
      </form>
      </div>
      <h3 style="margin-top: 20px;">Existing Schedules</h3>
      <div id="schedule-list"></div>
    </div>
  </main>

  <script>
    const TZ = 'Australia/Sydney';
    const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    let parishes = [], pendingEvents = [], pendingSchedules = [], pendingParishUpdates = [], pendingCancellations = [], droppedRuns = [], schedules = [], senders = [];
    let activeJurisdiction = '';
    const headers = { 'Content-Type': 'application/json' };

    // Jurisdiction filter
    document.getElementById('jurisdiction-filter').addEventListener('change', e => {
      activeJurisdiction = e.target.value;
      renderAll();
    });

    // Tabs
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('section-' + btn.dataset.tab).classList.add('active');
      });
    });

    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = 'toast toast-' + type;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
    }

    async function loadAll() {
      await Promise.all([loadParishes(), loadPendingEvents(), loadPendingSchedules(), loadPendingParishUpdates(), loadPendingCancellations(), loadDroppedRuns(), loadSchedules(), loadSenders()]);
      renderAll();
    }

    function renderAll() {
      renderStats();
      renderReviewQueue();
      renderPendingSchedules();
      renderPendingParishUpdates();
      renderPendingCancellations();
      renderDropped();
      renderParishList();
      renderScheduleList();
      renderSenders();
      renderParishSelects();
    }

    async function loadParishes() { parishes = await (await fetch('/api/parishes')).json(); }
    async function loadPendingEvents() { pendingEvents = await (await fetch('/api/admin/events/pending', { headers })).json(); }
    async function loadPendingSchedules() { pendingSchedules = await (await fetch('/api/admin/schedules/pending', { headers })).json(); }
    async function loadPendingParishUpdates() { pendingParishUpdates = await (await fetch('/api/admin/parish-updates', { headers })).json(); }
    async function loadPendingCancellations() { pendingCancellations = await (await fetch('/api/admin/cancellations', { headers })).json(); }
    async function loadDroppedRuns() { droppedRuns = await (await fetch('/api/admin/dropped', { headers })).json(); }
    async function loadSchedules() { schedules = await (await fetch('/api/admin/schedules', { headers })).json(); }
    async function loadSenders() { senders = await (await fetch('/api/admin/senders', { headers })).json(); }

    function filteredParishes() {
      if (!activeJurisdiction) return parishes;
      return parishes.filter(p => p.jurisdiction === activeJurisdiction);
    }
    function filteredSchedules() {
      if (!activeJurisdiction) return schedules;
      return schedules.filter(s => s.parish_jurisdiction === activeJurisdiction);
    }
    function filteredEvents() {
      if (!activeJurisdiction) return pendingEvents;
      return pendingEvents.filter(e => {
        const p = parishes.find(p => p.id === e.parish_id);
        return p && p.jurisdiction === activeJurisdiction;
      });
    }

    function renderStats() {
      const evtCount = filteredEvents().length;
      const totalReview = evtCount + pendingSchedules.length + pendingParishUpdates.length + pendingCancellations.length + droppedRuns.length;
      document.getElementById('count-review').textContent = totalReview;
      document.getElementById('count-parishes').textContent = filteredParishes().length;
      document.getElementById('count-schedules').textContent = filteredSchedules().length;
      document.getElementById('count-senders').textContent = senders.length;
      const ec = document.getElementById('review-events-count');
      if (ec) ec.textContent = evtCount ? `(${evtCount})` : '';
      const sc = document.getElementById('review-schedules-count');
      if (sc) sc.textContent = pendingSchedules.length ? `(${pendingSchedules.length})` : '';
      const pc = document.getElementById('review-parishes-count');
      if (pc) pc.textContent = pendingParishUpdates.length ? `(${pendingParishUpdates.length})` : '';
      const cc = document.getElementById('review-cancellations-count');
      if (cc) cc.textContent = pendingCancellations.length ? `(${pendingCancellations.length})` : '';
      const dc = document.getElementById('review-dropped-count');
      if (dc) dc.textContent = droppedRuns.length ? `(${droppedRuns.length})` : '';
    }

    function renderParishSelects() {
      const fps = filteredParishes().filter(p => p.id !== '_unassigned');
      const opts = fps.map(p => `<option value="${esc(p.id)}">${esc(p.name)}</option>`).join('');
      const sel = document.getElementById('schedule-parish-select');
      if (sel) sel.innerHTML = opts;
    }

    // ── Time helpers ──
    function utcToLocalInput(utcStr) {
      if (!utcStr) return '';
      const d = new Date(utcStr);
      const local = new Date(d.toLocaleString('en-US', { timeZone: TZ }));
      const pad = n => String(n).padStart(2, '0');
      return `${local.getFullYear()}-${pad(local.getMonth()+1)}-${pad(local.getDate())}T${pad(local.getHours())}:${pad(local.getMinutes())}`;
    }
    function localInputToUtc(localStr) {
      if (!localStr) return null;
      const d = new Date(localStr + 'Z');
      const year = d.getUTCFullYear();
      function firstSunday(y, m) { const dt = new Date(Date.UTC(y, m, 1)); return 1 + (7 - dt.getUTCDay()) % 7; }
      const dstStart = new Date(Date.UTC(year, 9, firstSunday(year, 9), 2, 0, 0));
      const dstEnd = new Date(Date.UTC(year, 3, firstSunday(year, 3), 3, 0, 0));
      const offset = (d >= dstEnd && d < dstStart) ? 10 : 11;
      return new Date(d.getTime() - offset * 3600000).toISOString();
    }

    // ── Review Queue ──
    function renderReviewQueue() {
      const c = document.getElementById('review-events-list');
      const evts = filteredEvents();
      if (!evts.length) { c.innerHTML = '<div class="empty">No events pending review</div>'; return; }
      const types = ['liturgy','prayer','feast','talk','youth','social','other'];
      c.innerHTML = evts.map(evt => {
        const start = new Date(evt.start_utc);
        const dateFmt = new Intl.DateTimeFormat('en-AU', { timeZone: TZ, weekday: 'short', day: 'numeric', month: 'short', hour: 'numeric', minute: '2-digit' }).format(start);
        const isUn = evt.parish_id === '_unassigned';
        const pOpts = parishes.map(p => `<option value="${esc(p.id)}" ${p.id === evt.parish_id ? 'selected' : ''}>${esc(p.name)}</option>`).join('');
        const inputTexts = (() => { try { return JSON.parse(evt.input_texts || '[]'); } catch { return []; } })();
        const posterHtml = evt.poster_path ? `<img src="${esc(evt.poster_path)}" class="review-poster" alt="poster" onclick="window.open('${esc(evt.poster_path)}','_blank')">` : '';
        const msgText = inputTexts.filter(Boolean).join(' · ');
        const sourceRow = (posterHtml || msgText) ? `
          <div class="review-poster-row">
            ${posterHtml}
            ${msgText ? `<div class="source-msg">${esc(msgText)}</div>` : ''}
          </div>` : '';
        return `
          <div class="card ${isUn ? 'warn' : ''}" data-id="${evt.id}">
            <div style="display:flex;justify-content:space-between;align-items:start;gap:6px;flex-wrap:wrap;">
              <span class="card-title">${esc(evt.title)}</span>
              <span class="badge badge-${evt.event_type}">${evt.event_type}</span>
            </div>
            <div class="card-meta">${dateFmt} &middot; ${esc(evt.parish_name || evt.source_adapter)}${evt.description ? ' &middot; ' + esc(evt.description) : ''}</div>
            ${sourceRow}
            <div class="field"><label>Title</label><input class="re-title" value="${esc(evt.title)}"></div>
            <div class="field"><label>Description</label><input class="re-desc" value="${esc(evt.description || '')}"></div>
            <div class="field-row">
              <div class="field"><label>Type</label><select class="re-type">${types.map(t => `<option value="${t}" ${evt.event_type===t?'selected':''}>${t}</option>`).join('')}</select></div>

    // ── Pending Parish Updates ──
    function renderPendingParishUpdates() {
      const c = document.getElementById('review-parishes-list');
      if (!pendingParishUpdates.length) { c.innerHTML = '<div class="empty">No parish changes pending review</div>'; return; }
      const parseLangs = v => { try { return JSON.parse(v || '[]').join(', '); } catch { return v || ''; } };
      c.innerHTML = pendingParishUpdates.map(pu => {
        let changes;
        try { changes = JSON.parse(pu.proposed_changes); } catch { changes = {}; }
        const fieldLabels = { name: 'Name', full_name: 'Full Name', address: 'Address', website: 'Website', email: 'Email', phone: 'Phone', acronym: 'Acronym', chant_style: 'Chant Style', live_url: 'Live URL', languages: 'Languages' };
        const currentValues = {
          name: pu.parish_name, full_name: pu.parish_full_name, address: pu.parish_address, website: pu.parish_website,
          email: pu.parish_email, phone: pu.parish_phone, acronym: pu.parish_acronym,
          chant_style: pu.parish_chant_style, live_url: pu.parish_live_url,
          languages: parseLangs(pu.parish_languages)
        };
        // New shape: { sets, clears }. Legacy flat blob: treat as sets only and
        // silently drop null entries (matches apply-path so preview == effect).
        const isNewShape = changes && typeof changes === 'object' && (changes.sets || changes.clears);
        const setsObj = isNewShape ? (changes.sets || {}) : (changes || {});
        const clearsArr = isNewShape ? (Array.isArray(changes.clears) ? changes.clears : []) : [];
        const setRows = Object.entries(setsObj)
          .filter(([, v]) => v != null && v !== '')
          .map(([k, v]) => {
            const label = fieldLabels[k] || k;
            const oldVal = k === 'languages' ? parseLangs(pu.parish_languages) : (currentValues[k] || '—');
            const newVal = Array.isArray(v) ? v.join(', ') : v;
            return `<div><div style="font-size:11px;color:var(--muted);font-weight:500;">${esc(label)}</div>
              <div class="diff-row"><span class="diff-old">${esc(String(oldVal))}</span><span class="diff-new">${esc(String(newVal))}</span></div></div>`;
          }).join('');
        const clearRows = clearsArr.map(k => {
          const label = fieldLabels[k] || k;
          const oldVal = k === 'languages' ? parseLangs(pu.parish_languages) : (currentValues[k] || '—');
          return `<div><div style="font-size:11px;color:var(--muted);font-weight:500;">${esc(label)}</div>
            <div class="diff-row"><span class="diff-old">${esc(String(oldVal))}</span><span class="diff-new">(cleared)</span></div></div>`;
        }).join('');
        const diffRows = setRows + clearRows;
        const inputTexts = (() => { try { return JSON.parse(pu.input_texts || '[]'); } catch { return []; } })();
        const msgText = inputTexts.filter(Boolean).join(' · ');
        return `
          <div class="card" data-pu-id="${pu.id}">
            <div class="card-title">${esc(pu.parish_name)}</div>
            <div class="card-meta">From +${esc(pu.sender_phone || '?')}</div>
            ${msgText ? `<div class="source-msg">${esc(msgText)}</div>` : ''}
            <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px;">${diffRows}</div>
            <div class="btn-row">
              <button class="btn btn-approve" onclick="approveParishUpdate(${pu.id})">Apply</button>
              <button class="btn btn-reject" onclick="rejectParishUpdate(${pu.id})">Dismiss</button>
            </div>
          </div>`;
      }).join('');
    }

    async function deleteParish(id) {
      const res = await fetch(`/api/admin/parishes/${id}`, { method: 'DELETE', headers });
      if (res.ok) { toast('Removed'); loadAll(); return; }
      const err = await res.json();
      if (!err.event_count) { toast(err.error || 'Failed', 'error'); return; }
      const choice = prompt(`This parish has ${err.event_count} events.\n\nType a parish name to transfer events to it, or type DELETE to remove all events and the parish:`);
      if (!choice) return;
      if (choice.trim() === 'DELETE') {
        const r2 = await fetch(`/api/admin/parishes/${id}?delete_events=1`, { method: 'DELETE', headers });
        if (r2.ok) { toast('Parish and events deleted'); loadAll(); } else toast('Failed', 'error');
      } else {
        const target = parishes.find(p => p.name.toLowerCase() === choice.trim().toLowerCase() || p.id === choice.trim());
        if (!target) { toast('Parish not found — use exact name or ID', 'error'); return; }
        const r2 = await fetch(`/api/admin/parishes/${id}?transfer_to=${encodeURIComponent(target.id)}`, { method: 'DELETE', headers });
        if (r2.ok) { toast(`Events transferred to ${target.name}, parish deleted`); loadAll(); } else { const e2 = await r2.json(); toast(e2.error || 'Failed', 'error'); }
      }
    }

                  <div class="field"><label>Title</label><input value="${esc(s.title)}" data-field="title"></div>
                  <div class="field"><label>Day</label>
                    <select data-field="day_of_week">${[0,1,2,3,4,5,6].map(d => `<option value="${d}" ${s.day_of_week===d?'selected':''}>${DAYS[d]}</option>`).join('')}</select>
                  </div>
                  <div class="field"><label>Start</label><input type="time" value="${esc(s.start_time)}" data-field="start_time"></div>
                  <div class="field"><label>End</label><input type="time" value="${esc(s.end_time || '')}" data-field="end_time"></div>
                  <div class="field"><label>Type</label>
                    <select data-field="event_type">${types.map(t => `<option value="${t}" ${s.event_type===t?'selected':''}>${t}</option>`).join('')}</select>
                  </div>
                  <div class="field"><label>Languages</label><input value="${esc(parseLangs(s.languages))}" data-field="languages"></div>
                </div>
                <div class="field" style="margin-top:8px;">
                  <label>Weeks (blank = every week)</label>
                  <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;" data-field="week_of_month">
                    ${['first','second','third','fourth','last'].map(w =>
                      `<label style="display:flex;align-items:center;gap:3px;font-size:13px;"><input type="checkbox" value="${w}" ${womChecked.includes(w)?'checked':''}> ${w}</label>`
                    ).join('')}
                  </div>
                </div>
                <div class="field" style="margin-top:8px;">
                  <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;">
                    <input type="checkbox" data-field="concurrent" ${s.concurrent ? 'checked' : ''}>
                    Concurrent — show alongside other services at the same time
                  </label>
                </div>
                <div class="field" style="margin-top:6px;">
                  <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;">
                    <input type="checkbox" data-field="hide_live" ${s.hide_live ? 'checked' : ''}>
                    Never show live badge
                  </label>
                </div>
                <div class="field" style="margin-top:6px;">
                  <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;">
                    <input type="checkbox" data-field="parish_scoped" ${s.parish_scoped ? 'checked' : ''}>
                    Parish-only (hidden unless filtered to parish)
                  </label>
                </div>
                <div class="btn-row">
                  <button class="btn btn-primary" onclick="saveSchedule(${s.id})">Save</button>
                </div>
              </div>
            </div>`;
        }).join('');

        return `
          <div class="parish-group" id="pg-${esc(pid)}">
            <div class="parish-group-header" onclick="toggleParishGroup('${esc(pid)}')">
              <div>
                <span class="parish-group-name">${esc(name)}</span>
                <span class="parish-group-meta"> &middot; ${activeCount}/${scheds.length} active</span>
              </div>
              <span class="parish-group-chevron">▼</span>
            </div>
            <div class="parish-group-body">${schedHtml}</div>
          </div>`;
      }).join('');
    }

    function toggleParishGroup(pid) {
      document.getElementById('pg-' + pid).classList.toggle('open');
    }

    document.getElementById('schedule-form').addEventListener('submit', async e => {
      e.preventDefault(); const f = e.target;
      const langsRaw = f.languages.value.trim();
      const data = { parish_id: f.parish_id.value, day_of_week: parseInt(f.day_of_week.value), start_time: f.start_time.value,
        end_time: f.end_time.value || null, title: f.title.value.trim(), event_type: f.event_type.value,
        languages: langsRaw ? JSON.stringify(langsRaw.split(',').map(s => s.trim()).filter(Boolean)) : null,
        hide_live: f.hide_live.checked, parish_scoped: f.parish_scoped.checked };
      const res = await fetch('/api/admin/schedules', { method: 'POST', headers, body: JSON.stringify(data) });
      if (res.ok) { toast('Schedule added'); f.reset(); loadAll(); } else { const e = await res.json(); toast(e.error || 'Failed', 'error'); }
    });

    async function saveSchedule(id) {
      const c = document.getElementById('se-' + id);
      const data = {};
      c.querySelectorAll('[data-field]').forEach(el => {
        const field = el.dataset.f || el.dataset.field;
        if (!field) return;
        if (field === 'week_of_month') {
          const checked = [...el.querySelectorAll('input[type=checkbox]:checked')].map(cb => cb.value);
          data[field] = checked.length ? checked.join(',') : null;
        } else if (field === 'concurrent' || field === 'hide_live' || field === 'parish_scoped') {
          data[field] = el.checked ? 1 : 0;
        } else if (el.tagName === 'DIV') {
          return; // skip wrapper divs without data-f
        } else {
          const val = el.tagName === 'SELECT' ? el.value : el.value.trim();
          if (field === 'languages') data[field] = val ? JSON.stringify(val.split(',').map(s => s.trim()).filter(Boolean)) : null;
          else if (field === 'day_of_week') data[field] = parseInt(val);
          else data[field] = val || null;
        }
      });
      const res = await fetch(`/api/admin/schedules/${id}`, { method: 'PATCH', headers, body: JSON.stringify(data) });
      if (res.ok) { toast('Schedule saved'); loadAll(); } else { const e = await res.json(); toast(e.error || 'Failed', 'error'); }
    }

    async function toggleSchedule(id, active) {
      const res = await fetch(`/api/admin/schedules/${id}`, { method: 'PATCH', headers, body: JSON.stringify({ active }) });
      if (res.ok) { toast(active ? 'Enabled' : 'Disabled'); loadAll(); } else toast('Failed', 'error');
    }
    async function deleteSchedule(id) {
      if (!confirm('Delete this schedule?')) return;
      const res = await fetch(`/api/admin/schedules/${id}`, { method: 'DELETE', headers });
      if (res.ok) { toast('Deleted'); loadAll(); } else toast('Failed', 'error');
    }

    async function geocodeParish(id) {
      const c = document.getElementById('pe-' + id);
      const addr = c.querySelector('[data-field="address"]').value.trim();
      if (!addr) return toast('Enter an address first', 'error');
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1`);
        const r = await res.json();
        if (!r.length) return toast('Address not found', 'error');
        const lat = parseFloat(r[0].lat).toFixed(6);
        const lng = parseFloat(r[0].lon).toFixed(6);
        c.querySelector('[data-field="lat"]').value = lat;
        c.querySelector('[data-field="lng"]').value = lng;
        toast(`Geocoded: ${lat}, ${lng}`);
      } catch { toast('Geocode failed', 'error'); }
    }

    // Geocode (add parish form)
    document.getElementById('geocode-btn').addEventListener('click', async () => {
      const addr = document.querySelector('[name="address"]').value;
      if (!addr) return toast('Enter address first', 'error');
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1`);
        const r = await res.json();
        if (r.length) { document.querySelector('[name="lat"]').value = parseFloat(r[0].lat).toFixed(4); document.querySelector('[name="lng"]').value = parseFloat(r[0].lon).toFixed(4); toast('Geocoded'); }
        else toast('Not found', 'error');
      } catch { toast('Geocode failed', 'error'); }
    });

    function esc(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }

    loadAll().then(() => {
      lastReviewTotal = pendingEvents.length + pendingSchedules.length + pendingParishUpdates.length + pendingCancellations.length + droppedRuns.length;
    });

    // ── Live-update: poll review endpoints; refresh when counts grow ──
    let lastReviewTotal = -1;
    let pendingAutoRefresh = false;

    function reviewHasFocusedInput() {
      const a = document.activeElement;
      return a && document.getElementById('section-review').contains(a)
        && (a.tagName === 'INPUT' || a.tagName === 'TEXTAREA' || a.tagName === 'SELECT');
    }

    async function pollReview() {
      if (document.visibilityState !== 'visible') return;
      try {
        const [ev, sc, pu, pcl, dr] = await Promise.all([
          fetch('/api/admin/events/pending', { headers }).then(r => r.json()),
          fetch('/api/admin/schedules/pending', { headers }).then(r => r.json()),
          fetch('/api/admin/parish-updates', { headers }).then(r => r.json()),
          fetch('/api/admin/cancellations', { headers }).then(r => r.json()),
          fetch('/api/admin/dropped', { headers }).then(r => r.json()),
        ]);
        const total = ev.length + sc.length + pu.length + pcl.length + dr.length;
        if (lastReviewTotal < 0) { lastReviewTotal = total; return; }
        if (total > lastReviewTotal) {
          const delta = total - lastReviewTotal;
          lastReviewTotal = total;
          if (reviewHasFocusedInput()) {
            pendingAutoRefresh = true;
            toast(`${delta} new review item${delta > 1 ? 's' : ''} — finishing edit first`);
          } else {
            pendingEvents = ev; pendingSchedules = sc; pendingParishUpdates = pu; pendingCancellations = pcl; droppedRuns = dr;
            renderAll();
            toast(`${delta} new review item${delta > 1 ? 's' : ''}`);
          }
        } else if (total !== lastReviewTotal) {
          lastReviewTotal = total;
        }
      } catch {}
    }

    setInterval(pollReview, 8000);

    // When a review-section input loses focus, apply any deferred refresh
    document.getElementById('section-review').addEventListener('focusout', () => {
      setTimeout(() => {
        if (pendingAutoRefresh && !reviewHasFocusedInput()) {
          pendingAutoRefresh = false;
          loadAll();
        }
      }, 0);
    });
  </script>
</body>
</html>

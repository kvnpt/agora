<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orthodox Services & Events — Sydney</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <!-- Jurisdiction banner -->
  <div class="jurisdiction-banner" id="jurisdiction-chips"></div>

  <!-- Map (peek height, expandable) -->
  <div class="map-container" id="map-container">
    <div id="map"></div>
    <button class="map-toggle" id="map-toggle" aria-label="Expand map"></button>
  </div>

  <!-- Mode bar: Services button + Events pills -->
  <div class="mode-bar">
    <button class="services-btn" id="btn-services">Services</button>
    <nav class="time-pills" id="time-pills">
      <button class="pill active" data-range="today">Today</button>
      <button class="pill" data-range="week">This week</button>
      <button class="pill" data-range="month">This month</button>
    </nav>
  </div>

  <!-- Events view (default) -->
  <div id="events-view" class="content-view active">
    <div id="events-list" class="events-list"></div>
  </div>

  <!-- Services view -->
  <div id="services-view" class="content-view">
    <div id="services-list" class="services-list"></div>
  </div>

  <!-- Event detail panel -->
  <div id="event-detail" class="detail-panel hidden">
    <button class="close-btn" id="close-detail">&times;</button>
    <div id="detail-content"></div>
  </div>

  <!-- Admin link (injected by JS if on Tailnet) -->
  <div class="admin-float" id="admin-float" style="display:none;">
    <a href="/admin">Admin</a>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/map.js"></script>
  <script src="/filters.js"></script>
  <script src="/app.js"></script>
</body>
</html>

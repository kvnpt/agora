<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Orthodox Services & Events — Sydney</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/lib/maplibre-gl.css" />
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <!-- Loading overlay (gum-tree fills from bottom; Minecraft-style verbose log).
       Removed by lsHide() once parishes + events + first render are done. -->
  <div id="loading-screen" aria-hidden="true">
    <div class="ls-header">orthodoxy.au</div>
    <!-- Eucalyptus SVG is injected on boot (random pick of 7) by the inline
         script below. The wrapper stays empty until the fetch resolves. -->
    <div class="ls-tree-wrap"></div>
    <div class="ls-log" id="ls-log"></div>
  </div>
  <script>
    // Inline boot loader — defined before app.js so it can log from anywhere.
    // Tree fills via CSS scaleY on the clip-rect; log stream emulates a
    // Minecraft world-loader with a pool of fake-verbose init messages and
    // real events pushed in from app.js as data arrives.
    (function () {
      var log = document.getElementById('ls-log');
      var screen = document.getElementById('loading-screen');
      var progress = 0;

      function lsLog(msg) {
        if (!log) return;
        // Single status line that re-animates on each update — no stack.
        // Fresh element forces the CSS enter animation to retrigger.
        while (log.firstChild) log.removeChild(log.firstChild);
        var line = document.createElement('div');
        line.className = 'ls-log-line';
        line.textContent = msg;
        log.appendChild(line);
      }
      function lsProgress(p) {
        progress = Math.max(progress, Math.min(1, p));
        // Rect is created asynchronously once the random eucalyptus SVG
        // loads — re-query each call so progress lands whether the SVG
        // arrived or not.
        var rect = document.getElementById('ls-tree-fill-rect');
        if (rect) rect.style.transform = 'scaleY(' + progress + ')';
      }
      function lsHide() {
        lsProgress(1);
        setTimeout(function () {
          if (!screen) return;
          screen.classList.add('hidden');
          setTimeout(function () { if (screen && screen.parentNode) screen.parentNode.removeChild(screen); }, 750);
        }, 400);
      }

      // Filler messages — deterministic-ish but shuffled so each load looks
      // different. Real progress events (from app.js) interleave via lsLog.
      var pool = [
        'Initialising namespace…',
        'Parsing Australia/Sydney timezone…',
        'Allocating tile cache (CARTO light_all)…',
        'Reading jurisdiction palette…',
        'Warming haversine cache…',
        'Hydrating cached location…',
        'Seeding parish-filter pills…',
        'Binding touch event handlers…',
        'Disabling pull-to-refresh…',
        'Inflating map container…',
        'Computing viewport bounds…',
        'Synchronising URL slug state…',
        'Registering history popstate handler…',
        'Scheduling LIVE countdown timer (60s)…',
        'Checking admin session…',
        'Evaluating prefers-color-scheme…',
        'Reticulating iconostases…',
        'Calibrating bottom-sheet snap points…',
        'Resolving adapter registry…',
        'Mounting event-card delegate…',
        'Opening IndexedDB (noop)…',
        'Priming Leaflet divIcon pool…',
        'Loading tabler-location.svg…',
        'Checking service worker (disabled)…',
        'Measuring safe-area insets…'
      ];
      for (var i = pool.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = pool[i]; pool[i] = pool[j]; pool[j] = t;
      }

      lsLog('» boot orthodoxy.au');
      var poolIdx = 0;
      var spam = setInterval(function () {
        if (!document.getElementById('loading-screen')) { clearInterval(spam); return; }
        lsLog(pool[poolIdx % pool.length]);
        poolIdx++;
        // Creep fill on filler lines so the tree grows even before real
        // events arrive. Real events bump it further.
        lsProgress(progress + 0.02);
      }, 85);

      window.lsLog = lsLog;
      window.lsProgress = lsProgress;
      window.lsHide = lsHide;

      // Eucalyptus tree: cached in localStorage for instant boot on repeat
      // visits. Most loads reuse the cached SVG; a small reroll chance
      // occasionally picks a new one — long-term variety without forcing
      // short-term churn. No cache (first visit) always fetches.
      var TOTAL = 7;
      var REROLL_CHANCE = 0.2;
      var cachedSvg = null, cachedIdx = null;
      try {
        cachedSvg = localStorage.getItem('ls-tree-svg');
        cachedIdx = localStorage.getItem('ls-tree-idx');
      } catch (e) {}
      var shouldReroll = !cachedSvg || Math.random() < REROLL_CHANCE;

      function mountTree(text, idx) {
        var SVG_NS = 'http://www.w3.org/2000/svg';
        var doc = new DOMParser().parseFromString(text, 'image/svg+xml');
        var src = doc.querySelector('svg');
        if (!src) return;
        var vb = src.getAttribute('viewBox') || '0 0 2048 2048';
        var parts = vb.split(/\s+/).map(Number);
        var x0 = parts[0] || 0, y0 = parts[1] || 0;
        var vbW = (parts[2] || 2048) - x0;
        var vbH = (parts[3] || 2048) - y0;

        var out = document.createElementNS(SVG_NS, 'svg');
        out.setAttribute('class', 'ls-tree');
        out.setAttribute('viewBox', vb);
        out.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        out.setAttribute('aria-hidden', 'true');

        var defs = document.createElementNS(SVG_NS, 'defs');
        var clip = document.createElementNS(SVG_NS, 'clipPath');
        clip.setAttribute('id', 'ls-tree-fill-clip');
        var rect = document.createElementNS(SVG_NS, 'rect');
        rect.setAttribute('id', 'ls-tree-fill-rect');
        rect.setAttribute('x', String(x0));
        rect.setAttribute('y', String(y0));
        rect.setAttribute('width', String(vbW));
        rect.setAttribute('height', String(vbH));
        clip.appendChild(rect);
        defs.appendChild(clip);
        out.appendChild(defs);

        var outline = document.createElementNS(SVG_NS, 'g');
        outline.setAttribute('class', 'ls-outline-pass');
        var colour = document.createElementNS(SVG_NS, 'g');
        colour.setAttribute('class', 'ls-colour-pass');
        colour.setAttribute('clip-path', 'url(#ls-tree-fill-clip)');

        var kids = Array.prototype.slice.call(src.childNodes);
        for (var i = 0; i < kids.length; i++) {
          outline.appendChild(kids[i].cloneNode(true));
          colour.appendChild(kids[i].cloneNode(true));
        }
        out.appendChild(outline);
        out.appendChild(colour);

        var wrap = document.querySelector('.ls-tree-wrap');
        if (!wrap) return;
        while (wrap.firstChild) wrap.removeChild(wrap.firstChild);
        wrap.appendChild(out);
        // Replay whatever progress accumulated before mount.
        lsProgress(progress);
      }

      if (!shouldReroll && cachedSvg) {
        mountTree(cachedSvg, cachedIdx);
      } else {
        var idx = Math.floor(Math.random() * TOTAL) + 1;
        fetch('/eucalyptus/eucalyptus-' + idx + '.svg')
          .then(function (r) { return r.ok ? r.text() : null; })
          .then(function (text) {
            if (!text) return;
            try {
              localStorage.setItem('ls-tree-svg', text);
              localStorage.setItem('ls-tree-idx', String(idx));
            } catch (e) {}
            mountTree(text, idx);
          })
          .catch(function () {
            // Fetch failed — fall back to cache if we have one.
            if (cachedSvg) mountTree(cachedSvg, cachedIdx);
          });
      }

      // Safety net — if applyStartMode throws or a fetch hangs, tear down
      // the overlay after 10s so the user isn't stuck behind a tree.
      setTimeout(function () { lsHide(); }, 10000);
    })();
  </script>

  <!-- Jurisdiction banner -->
  <div class="jurisdiction-banner" id="jurisdiction-chips"></div>

  <!-- Map (full-screen background) -->
  <div class="map-container" id="map-container">
    <div id="map"></div>
  </div>

  <!-- Reset filter pill (top center, visible when any filter active) -->
  <button id="reset-fab" type="button">Show all</button>

  <!-- Location FAB (bottom right, above sheet) -->
  <button id="location-fab" type="button" title="My location">
    <img src="/tabler-location.svg" alt="">
  </button>

  <!-- Filters FAB (bottom left, above sheet) + active filter label stack -->
  <div id="filter-active-stack" class="filter-active-stack">
    <button id="filter-clear-btn" class="filter-clear-chip" type="button">&#x2715; Clear</button>
    <div id="filter-chip-list" class="filter-chip-list"></div>
  </div>
  <button id="btn-filters" class="map-fab filters-fab has-active" type="button" aria-haspopup="menu" aria-expanded="false" title="Filters">
    <span class="filters-btn-content">
      <img src="https://api.iconify.design/ph:sliders.svg" alt="">
    </span>
  </button>

  <!-- Filters dropdown menu, anchored to #btn-filters via positionFiltersMenu -->
  <div class="filters-menu hidden" id="filters-menu" role="menu">
    <button class="filters-menu-item" id="btn-events" role="menuitemradio">
      <img class="fm-icon" src="https://api.iconify.design/ph:list.svg" alt="">
      <span class="fm-label">Events</span>
    </button>
    <button class="filters-menu-item" id="btn-services" role="menuitemradio">
      <img class="fm-icon" src="https://api.iconify.design/ph:church.svg" alt="">
      <span class="fm-label">Schedules</span>
    </button>
    <button class="filters-menu-item" id="btn-social" role="menuitemradio">
      <img class="fm-icon" src="https://api.iconify.design/fluent:people-community-16-regular.svg" alt="">
      <span class="fm-label">Socials</span>
    </button>
    <div class="filters-menu-sep" aria-hidden="true"></div>
    <button class="filters-menu-item fm-english" id="btn-english" role="menuitemcheckbox">
      <span class="fm-icon fm-en-badge">EN</span>
      <span class="fm-label">English</span>
    </button>
    <div class="filters-menu-sep fm-multi-sep" aria-hidden="true"></div>
    <button class="filters-menu-item" id="btn-multi-parish" role="menuitemcheckbox">
      <img class="fm-icon" src="https://api.iconify.design/ph:list-plus.svg" alt="">
      <span class="fm-label">Create filter</span>
    </button>
    <div class="filters-menu-sep fm-admin-sep" aria-hidden="true" hidden></div>
    <a class="filters-menu-item fm-admin" id="btn-admin" href="/admin" role="menuitem" hidden>
      <img class="fm-icon" src="https://api.iconify.design/ph:shield-check.svg" alt="">
      <span class="fm-label">Admin</span>
    </a>
    <button class="filters-menu-item fm-logout" id="btn-logout" role="menuitem" hidden>
      <img class="fm-icon" src="https://api.iconify.design/ph:sign-out.svg" alt="">
      <span class="fm-label">Log out</span>
    </button>
  </div>

  <!-- Map-selection overlay (visible when state.selectionMode is true) -->
  <div id="map-select-overlay" class="hidden" aria-hidden="true">
    <div class="map-select-ring"></div>
    <div class="map-select-label">Select parishes</div>
    <button id="map-select-confirm" class="map-fab confirm-fab" type="button" aria-label="Confirm selection">
      <img src="https://api.iconify.design/ph:check-bold.svg" alt="">
    </button>
  </div>

  <div id="bottom-sheet">
    <div class="map-grab-handle"></div>

    <!-- Mode bar: share pill (left), in-view chip (centred) -->
    <div class="mode-bar" id="mode-bar">
      <button class="mode-url share-pill" id="mode-url" type="button" aria-label="Share view">
        <img class="share-pill-icon" src="https://api.iconify.design/ph:share-network.svg" alt="">
        <span class="share-pill-label">Share View</span>
      </button>
      <button class="in-view-chip" id="in-view-chip" type="button" aria-label="Scroll sheet">
        <span class="in-view-count" id="in-view-count">0 parishes in view</span>
      </button>
    </div>

    <!-- Parish filter pills (shown when a jurisdiction is selected) -->
    <div class="parish-filter-row" id="parish-filter-row"></div>

    <!-- Archdiocese events banner (shown in services mode when jurisdiction selected) -->
    <a class="archdiocese-events-banner" id="archdiocese-events-banner" href="#" target="_blank" rel="noopener">
      <span class="archdiocese-events-label">Archdiocese Events</span>
      <img src="https://api.iconify.design/mingcute:external-link-line.svg" alt="" class="archdiocese-events-icon">
    </a>

    <!-- Scrollable content area -->
    <div id="sheet-scroll">
      <!-- Events view (default) -->
      <div id="events-view" class="content-view active">
        <div id="events-list" class="events-list"></div>
      </div>

      <!-- Services view -->
      <div id="services-view" class="content-view">
        <div id="services-list" class="services-list"></div>
      </div>
    </div>

    <!-- Offscreen buffer below sheet-scroll; becomes visible only when
         rubber-band lifts the sheet past SNAP_FULL, covering the map gap. -->
    <div class="sheet-spacer"></div>
  </div>

  <!-- Parish sheet (secondary bottom sheet, opened from event drawer) -->
  <div id="parish-sheet" class="parish-sheet hidden" aria-hidden="true">
    <div class="parish-sheet-grab-handle"></div>
    <button class="parish-sheet-close" id="parish-sheet-close" type="button" aria-label="Close">&times;</button>
    <div id="parish-sheet-scroll" class="parish-sheet-scroll">
      <div id="parish-sheet-content"></div>
    </div>
  </div>

  <!-- Event detail panel -->
  <div id="event-detail" class="detail-panel hidden">
    <div class="detail-grab-handle"></div>
    <button class="close-btn" id="close-detail">&times;</button>
    <div id="detail-content"></div>
  </div>

  <!-- Fullscreen poster lightbox -->
  <div id="poster-fullscreen" class="poster-fullscreen hidden">
    <img id="poster-fullscreen-img" src="" alt="Event poster">
    <a id="poster-download" class="poster-download" download aria-label="Download poster">
      <img src="https://api.iconify.design/ph:download-simple-bold.svg" alt="" class="poster-download-icon">
      Download
    </a>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/lib/maplibre-gl.js"></script>
  <script src="/lib/pmtiles.js"></script>
  <script src="/lib/leaflet-maplibre-gl.js"></script>
  <script src="/lib/protomaps-themes-base.js"></script>
  <script src="/map.js"></script>
  <script src="/filters.js"></script>
  <script src="/app.js"></script>

  <!-- Escalate modal (admin-only, injected at runtime) -->
  <div class="escalate-backdrop" id="escalate-backdrop" onclick="if(event.target===this)closePublicEscalateModal()">
    <div class="escalate-modal">
      <h2>Extend event scope</h2>
      <div class="escalate-modal-sub" id="escalate-pub-sub"></div>

      <div class="escalate-section-title">Appear at parishes</div>
      <div class="escalate-list" id="escalate-pub-parishes"></div>

      <div class="escalate-section-title">Replace events at selected parishes (optional)</div>
      <div class="escalate-list" id="escalate-pub-events"><div class="escalate-empty">Loading…</div></div>

      <div class="escalate-btn-row">
        <button class="btn-outline" onclick="closePublicEscalateModal()">Cancel</button>
        <button class="btn-primary" id="escalate-pub-confirm" onclick="confirmPublicEscalate()">Confirm</button>
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Orthodox Services & Events — Sydney</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <!-- Jurisdiction banner -->
  <div class="jurisdiction-banner" id="jurisdiction-chips"></div>

  <!-- Map (full-screen background) -->
  <div class="map-container" id="map-container">
    <div id="map"></div>
  </div>

  <!-- Reset filter pill (top center, visible when any filter active) -->
  <button id="reset-fab" type="button">Show all</button>

  <!-- Location FAB (bottom right, above sheet) -->
  <button id="location-fab" type="button" title="My location">
    <img src="/tabler-location.svg" alt="">
  </button>

  <div id="bottom-sheet">
    <div class="map-grab-handle"></div>

    <!-- Mode bar: filters button (left), URL + copy (centre), sort (right) -->
    <div class="mode-bar" id="mode-bar">
      <button class="filters-btn" id="btn-filters" type="button" aria-haspopup="menu" aria-expanded="false">
        <span class="filters-btn-content"><span class="filters-btn-label">Events</span></span>
      </button>
      <button class="mode-url" id="mode-url" type="button" aria-label="Copy page URL">
        <span class="mode-url-text" id="mode-url-text">orthodoxy.au</span>
        <img class="mode-url-copy" src="https://api.iconify.design/ph:copy.svg" alt="">
      </button>
      <!-- Dropdown menu, anchored under filters-btn -->
      <div class="filters-menu hidden" id="filters-menu" role="menu">
        <button class="filters-menu-item" id="btn-events" role="menuitemradio">
          <img class="fm-icon" src="https://api.iconify.design/ph:list.svg" alt="">
          <span class="fm-label">Events</span>
        </button>
        <button class="filters-menu-item" id="btn-services" role="menuitemradio">
          <img class="fm-icon" src="https://api.iconify.design/ph:church.svg" alt="">
          <span class="fm-label">Schedules</span>
        </button>
        <button class="filters-menu-item" id="btn-social" role="menuitemradio">
          <img class="fm-icon" src="https://api.iconify.design/fluent:people-community-16-regular.svg" alt="">
          <span class="fm-label">Socials</span>
        </button>
        <div class="filters-menu-sep" aria-hidden="true"></div>
        <button class="filters-menu-item fm-english" id="btn-english" role="menuitemcheckbox">
          <span class="fm-icon fm-en-badge">EN</span>
          <span class="fm-label">English</span>
        </button>
        <div class="filters-menu-sep" aria-hidden="true"></div>
        <button class="filters-menu-item" id="btn-multi-parish" role="menuitemcheckbox">
          <img class="fm-icon" src="https://api.iconify.design/ph:list-plus.svg" alt="">
          <span class="fm-label">Parish picker</span>
        </button>
        <div class="filters-menu-sep fm-admin-sep" aria-hidden="true" hidden></div>
        <a class="filters-menu-item fm-admin" id="btn-admin" href="/admin" role="menuitem" hidden>
          <img class="fm-icon" src="https://api.iconify.design/ph:shield-check.svg" alt="">
          <span class="fm-label">Admin</span>
        </a>
      </div>
    </div>

    <!-- Parish filter pills (shown when a jurisdiction is selected) -->
    <div class="parish-filter-row" id="parish-filter-row"></div>

    <!-- Archdiocese events banner (shown in services mode when jurisdiction selected) -->
    <a class="archdiocese-events-banner" id="archdiocese-events-banner" href="#" target="_blank" rel="noopener">
      <span class="archdiocese-events-label">Archdiocese Events</span>
      <img src="https://api.iconify.design/mingcute:external-link-line.svg" alt="" class="archdiocese-events-icon">
    </a>

    <!-- Scrollable content area -->
    <div id="sheet-scroll">
      <!-- Events view (default) -->
      <div id="events-view" class="content-view active">
        <div id="events-list" class="events-list"></div>
      </div>

      <!-- Services view -->
      <div id="services-view" class="content-view">
        <div id="services-list" class="services-list"></div>
      </div>
    </div>

    <!-- Offscreen buffer below sheet-scroll; becomes visible only when
         rubber-band lifts the sheet past SNAP_FULL, covering the map gap. -->
    <div class="sheet-spacer"></div>
  </div>

  <!-- Parish sheet (secondary bottom sheet, opened from event drawer) -->
  <div id="parish-sheet" class="parish-sheet hidden" aria-hidden="true">
    <div class="parish-sheet-grab-handle"></div>
    <button class="parish-sheet-close" id="parish-sheet-close" type="button" aria-label="Close">&times;</button>
    <div id="parish-sheet-scroll" class="parish-sheet-scroll">
      <div id="parish-sheet-content"></div>
    </div>
  </div>

  <!-- Event detail panel -->
  <div id="event-detail" class="detail-panel hidden">
    <div class="detail-grab-handle"></div>
    <button class="close-btn" id="close-detail">&times;</button>
    <div id="detail-content"></div>
  </div>

  <!-- Fullscreen poster lightbox -->
  <div id="poster-fullscreen" class="poster-fullscreen hidden">
    <img id="poster-fullscreen-img" src="" alt="Event poster">
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/map.js"></script>
  <script src="/filters.js"></script>
  <script src="/app.js"></script>
</body>
</html>
